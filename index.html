<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimal-ui, viewport-fit=cover">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="./aframe-keyboard.min.js"></script>
  <script src="https://unpkg.com/aframe-text-geometry-component/dist/aframe-text-geometry-component.min.js"></script>
  <script src="https://rawgit.com/rdub80/aframe-gui/master/dist/aframe-gui.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
 

  <title>VRdle</title>
  <style src="./style.css"></style>
  <script src="./words.js"></script>
  <script src="./displacment-offset-shader.js"></script>



</head>

<body>
  <div class="loading-screen">Loading VR Experience...</div>


  <a-scene id="scene" keyboard-controls="false" keyboard-shortcuts="enterVR: false" cursor="rayOrigin:mouse" keyboard>
    <a-assets>
      <model id="model" src="VRdle/logoc.gltf" />


      <img id="rules" src="./assets/images/rule.png">
      <a-asset-item id="optimerBoldFont"
        src="https://rawgit.com/mrdoob/three.js/dev/examples/fonts/optimer_bold.typeface.json"></a-asset-item>

    </a-assets>
    <!-- environment -->


    <a-entity environment="preset: default; 
                          skyType: none;
                          lighting: none;
                          shadow: false;
                          fog: 0.3;
                          ground: flat;
                          groundColor: #000000;
                          groundColor2: #000000;
                          dressing: none;
                          grid: none"></a-entity>


<!-- Starfield -->
<a-entity id="stars" position="0 0 0">
  <a-sphere radius="100" segments-height="64" segments-width="64" material="shader: flat; side: back; color: #000000">
    <a-entity position="0 0 0">
      <a-sphere radius="99.9" segments-height="64" segments-width="64" 
                material="shader: flat; side: back; color: #000000; opacity: 0.7">
        <a-particle-system preset="stars" particleCount="2000" color="#FFF" randomize="true"></a-particle-system>
      </a-sphere>
    </a-entity>
  </a-sphere>
</a-entity>
    <!-- wordle board -->


    <a-entity id="logo" scale="4 4 4" position="4.5 4 -1.5" rotation="0 -90 0"
      text-geometry="value:Poiesis; size:0.15; font: #optimerBoldFont;" >
      <a-entity id="logoline2" position="0 -.2 0" text-geometry="value:Education; size:0.15"
        material="color:orange; metalness: .4; roughness: 0.8;"></a-entity>
    </a-entity>

    <a-camera position="0.05 1.42 0.7" wasd-controls-enabled="false" far="20000" near="0.005"></a-camera>
    <a-entity id="ruleplane" geometry="primitive: plane; height: 1.8; width: 1.8" rotation="-90.00021045914971 0 0"
      material="src:#rules"></a-entity>
