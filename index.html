  <script type="text/javascript">
    AFRAME.registerComponent('backgroundButt', {
      schema: {
        default: ''
      },
      init() {
        const sky = document.querySelector('a-sky');
        var b = false
        this.el.addEventListener('click', () => {
          if (b) {
            sky.setAttribute('src', "#egy");
          } else {
            sky.setAttribute('src', "#aurora");
          }
          b = !b;
          console.log('clicked');
        });
      }
    });
  </script>


  <title>VRdle</title>
